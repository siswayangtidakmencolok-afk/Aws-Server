AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nusantara Telemedicine - DynamoDB Migration (No RDS)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DOCTORS_TABLE: !Ref DoctorsTable
        CHAT_TABLE: !Ref ChatSessionsTable
        CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
        BOOKING_QUEUE_URL: !Ref BookingQueue
        DOCUMENT_QUEUE_URL: !Ref DocumentQueue
        SNS_TOPIC_ARN: !Ref NotificationTopic
        S3_BUCKET: !Ref MedicalDocumentsBucket
        JWT_SECRET: "lks-secret-key-2024" # Hardcoded for reliability in debug

Resources:
  TelemedicineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub lks-api-peserta-${AWS::StackName}
      StageName: dev
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization

  # --- Functions ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-auth-${AWS::StackName}
      Handler: src/auth/index.loginHandler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-authorizer-${AWS::StackName}
      Handler: src/auth/index.authorizerHandler
      CodeUri: .

  DoctorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doctor-${AWS::StackName}
      Handler: src/doctor/index.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DoctorsTable
      Events:
        ListDoctors:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /doctor
            Method: GET
            Auth:
              Authorizer: JwtAuthorizer

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-upload-${AWS::StackName}
      Handler: src/upload/index.handler
      CodeUri: .
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MedicalDocumentsBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /upload-url
            Method: POST
            Auth:
              Authorizer: JwtAuthorizer

  InitDatabaseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-init-db-${AWS::StackName}
      Handler: src/migration/index.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DoctorsTable
      Events:
        InitDb:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /admin/init-db
            Method: POST
            Auth:
              Authorizer: NONE

  # Storage & Messaging
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-users-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  DoctorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-doctors-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  MedicalDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lks-tele-docs-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600

  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-chat-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-ws-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

  BookingQueue:
    Type: AWS::SQS::Queue
  DocumentQueue:
    Type: AWS::SQS::Queue
  NotificationTopic:
    Type: AWS::SNS::Topic

Outputs:
  ApiUrl:
    Value: !Sub "https://${TelemedicineApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
