AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nusantara Telemedicine - Full App (Testing SSM, No RDS)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        CHAT_TABLE: !Ref ChatSessionsTable
        CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
        BOOKING_QUEUE_URL: !Ref BookingQueue
        DOCUMENT_QUEUE_URL: !Ref DocumentQueue
        SNS_TOPIC_ARN: !Ref NotificationTopic

Resources:
  TelemedicineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub lks-api-peserta-${AWS::StackName}
      StageName: dev
      Cors:
        AllowOrigin: "'*'"
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization

  # --- Auth & Doctor Functions ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-auth-${AWS::StackName}
      Handler: src/auth/index.loginHandler
      CodeUri: .
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/login
            Method: POST
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/register
            Method: POST

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-authorizer-${AWS::StackName}
      Handler: src/auth/index.authorizerHandler
      CodeUri: .

  DoctorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doctor-${AWS::StackName}
      Handler: src/doctor/index.handler
      CodeUri: .
      Events:
        ListDoctors:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /doctor
            Method: GET
            Auth:
              Authorizer: JwtAuthorizer

  # --- Booking & Upload ---
  BookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-booking-${AWS::StackName}
      Handler: src/booking/index.handler
      CodeUri: .
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt BookingQueue.QueueName
      Events:
        CreateBooking:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /appointment
            Method: POST
            Auth:
              Authorizer: JwtAuthorizer

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-upload-${AWS::StackName}
      Handler: src/upload/index.handler
      CodeUri: .
      Environment:
        Variables:
          S3_BUCKET: !Ref MedicalDocumentsBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MedicalDocumentsBucket
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /upload-url
            Method: POST
            Auth:
              Authorizer: JwtAuthorizer

  # --- Notification & WebSocket ---
  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-notify-${AWS::StackName}
      Handler: src/notification/index.handler
      CodeUri: .
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt NotificationTopic.TopicName
      Events:
        BookingEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt BookingQueue.Arn

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-ws-conn-${AWS::StackName}
      Handler: src/websocket/index.connectHandler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable

  # --- SSM Parameters ---
  SSMJwtSecret:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /debug/${AWS::StackName}/jwt_secret
      Type: String
      Value: debug-secret-123

  # Storage & Messaging
  MedicalDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lks-tele-docs-${AWS::AccountId}

  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-chat-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-ws-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

  BookingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub lks-booking-q-${AWS::StackName}

  DocumentQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub lks-doc-q-${AWS::StackName}

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub lks-notify-topic-${AWS::StackName}

Outputs:
  ApiUrl:
    Value: !Sub "https://${TelemedicineApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
