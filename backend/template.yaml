AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nusantara Telemedicine - Minimal Stack for Debugging

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256

Resources:
  # API Gateway Minimal
  TelemedicineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub lks-api-debug-${AWS::StackName}
      StageName: dev
      Cors:
        AllowOrigin: "'*'"

  # Satu Lambda saja untuk tes
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-auth-debug-${AWS::StackName}
      Handler: src/auth/index.loginHandler
      CodeUri: .
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/login
            Method: POST

  # S3 Bucket dengan nama unik
  MedicalDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lks-telemedicine-debug-${AWS::AccountId}

Outputs:
  ApiUrl:
    Value: !Sub "https://${TelemedicineApi}.execute-api.${AWS::Region}.amazonaws.com/dev/auth/login"
