AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nusantara Telemedicine - Final Stable Stack (No RDS)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        CHAT_TABLE: !Ref ChatSessionsTable
        CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
        BOOKING_QUEUE_URL: !Ref BookingQueue
        DOCUMENT_QUEUE_URL: !Ref DocumentQueue
        SNS_TOPIC_ARN: !Ref NotificationTopic
        S3_BUCKET: !Ref MedicalDocumentsBucket

Resources:
  TelemedicineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub lks-api-peserta-${AWS::StackName}
      StageName: dev
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization

  # --- Functions ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-auth-${AWS::StackName}
      Handler: src/auth/index.loginHandler
      CodeUri: .
      Events:
        Login: {Type: Api, Properties: {RestApiId: !Ref TelemedicineApi, Path: /auth/login, Method: POST}}
        Register: {Type: Api, Properties: {RestApiId: !Ref TelemedicineApi, Path: /auth/register, Method: POST}}

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-authorizer-${AWS::StackName}
      Handler: src/auth/index.authorizerHandler
      CodeUri: .

  DoctorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doctor-${AWS::StackName}
      Handler: src/doctor/index.handler
      CodeUri: .
      Events:
        ListDoctors: {Type: Api, Properties: {RestApiId: !Ref TelemedicineApi, Path: /doctor, Method: GET, Auth: {Authorizer: JwtAuthorizer}}}

  BookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-booking-${AWS::StackName}
      Handler: src/booking/index.handler
      CodeUri: .
      Policies: [- SQSSendMessagePolicy: {QueueName: !GetAtt BookingQueue.QueueName}]
      Events:
        CreateBooking: {Type: Api, Properties: {RestApiId: !Ref TelemedicineApi, Path: /appointment, Method: POST, Auth: {Authorizer: JwtAuthorizer}}}

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-upload-${AWS::StackName}
      Handler: src/upload/index.handler
      CodeUri: .
      Policies: [- S3CrudPolicy: {BucketName: !Ref MedicalDocumentsBucket}]
      Events:
        GetUploadUrl: {Type: Api, Properties: {RestApiId: !Ref TelemedicineApi, Path: /upload-url, Method: POST, Auth: {Authorizer: JwtAuthorizer}}}

  DocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doc-${AWS::StackName}
      Handler: src/document/index.handler
      CodeUri: .
      Policies: [- S3CrudPolicy: {BucketName: !Ref MedicalDocumentsBucket}, - SQSSendMessagePolicy: {QueueName: !GetAtt DocumentQueue.QueueName}]
      Events:
        DocEvent: {Type: SQS, Properties: {Queue: !GetAtt DocumentQueue.Arn}}

  NotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-notify-${AWS::StackName}
      Handler: src/notification/index.handler
      CodeUri: .
      Policies: [- SNSPublishMessagePolicy: {TopicName: !GetAtt NotificationTopic.TopicName}]
      Events:
        BookingEvent: {Type: SQS, Properties: {Queue: !GetAtt BookingQueue.Arn}}

  # Storage & Messaging
  MedicalDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lks-tele-docs-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600

  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-chat-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{AttributeName: session_id, AttributeType: S}, {AttributeName: timestamp, AttributeType: N}]
      KeySchema: [{AttributeName: session_id, KeyType: HASH}, {AttributeName: timestamp, KeyType: RANGE}]

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-ws-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{AttributeName: connectionId, AttributeType: S}]
      KeySchema: [{AttributeName: connectionId, KeyType: HASH}]

  BookingQueue:
    Type: AWS::SQS::Queue
    Properties: {QueueName: !Sub lks-book-q-${AWS::StackName}}
  DocumentQueue:
    Type: AWS::SQS::Queue
    Properties: {QueueName: !Sub lks-doc-q-${AWS::StackName}}
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties: {TopicName: !Sub lks-notify-t-${AWS::StackName}}

Outputs:
  ApiUrl:
    Value: !Sub "https://${TelemedicineApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
  BucketName:
    Value: !Ref MedicalDocumentsBucket
