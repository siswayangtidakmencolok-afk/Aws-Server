AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Nusantara Telemedicine - Complete Final Stack (DynamoDB + S3 Trigger)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        DOCTORS_TABLE: !Ref DoctorsTable
        DOCUMENTS_TABLE: !Ref DocumentsTable
        S3_BUCKET: !Ref MedicalDocumentsBucket
        JWT_SECRET: "lks-secret-key-2024"

Resources:
  TelemedicineApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub lks-api-peserta-${AWS::StackName}
      StageName: dev
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            Identity:
              Header: Authorization

  # --- AUTH ---
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-auth-${AWS::StackName}
      Handler: src/auth/index.loginHandler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-authorizer-${AWS::StackName}
      Handler: src/auth/index.authorizerHandler
      CodeUri: .

  # --- DOCTOR ---
  DoctorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doctor-${AWS::StackName}
      Handler: src/doctor/index.handler
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DoctorsTable
      Events:
        ListDoctors:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /doctor
            Method: GET

  # --- UPLOAD & DOCUMENT ---
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-upload-${AWS::StackName}
      Handler: src/upload/index.handler
      CodeUri: .
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MedicalDocumentsBucket
      Events:
        GetUrl:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /upload-url
            Method: POST

  DocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-doc-${AWS::StackName}
      Handler: src/document/index.handler
      CodeUri: .
      Policies: 
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - S3ReadPolicy:
            BucketName: !Ref MedicalDocumentsBucket
      Events:
        ListDocs:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /document
            Method: GET
        S3Trigger:
          Type: S3
          Properties:
            Bucket: !Ref MedicalDocumentsBucket
            Events: s3:ObjectCreated:*

  InitDatabaseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub lks-init-db-${AWS::StackName}
      Handler: src/migration/index.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DoctorsTable
      Events:
        InitDb:
          Type: Api
          Properties:
            RestApiId: !Ref TelemedicineApi
            Path: /admin/init-db
            Method: POST
            Auth:
              Authorizer: NONE

  # --- TABLES ---
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-users-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  DoctorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-doctors-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub lks-docs-${AWS::StackName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE

  MedicalDocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub lks-tele-docs-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600

Outputs:
  ApiUrl:
    Value: !Sub "https://${TelemedicineApi}.execute-api.${AWS::Region}.amazonaws.com/dev/"
